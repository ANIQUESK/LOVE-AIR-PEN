<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Air Pen</title>

<meta name="description" content="Write in the air. Turn thoughts into reality. Love Air Pen uses AI hand tracking to draw with gestures.">
<meta name="theme-color" content="#ff2d8f">

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

</head>

<body>

<!-- FLOATING HEART BACKGROUND -->

<div class="hearts" id="hearts"></div>


<!-- VIDEO INPUT -->

<video id="video" autoplay playsinline></video>


<!-- WARNING SCREEN -->

<div id="warningScreen">

<div class="warningBox">

<h1>⚠️ Before You Start</h1>

<p>
Whatever you write here may become real.<br>
So write with love and positivity.
</p>

<button id="startBtn">Enter Experience</button>

</div>

</div>


<!-- NAME INPUT SCREEN (NEW) -->

<div id="nameScreen" style="display:none;">

<div class="nameBox">

<h1>✨ One Last Thing</h1>

<p>Enter your name</p>

<input
id="userName"
type="text"
placeholder="Your Name"
/>

<button id="continueBtn">Continue</button>

</div>

</div>


<!-- PERSONAL MESSAGE SCREEN (NEW) -->

<div id="messageScreen" style="display:none;">

<div class="messageBox">

<p id="personalMessage"></p>

</div>

</div>


<!-- DRAWING CANVAS -->

<canvas id="canvas"></canvas>


<!-- CONTROL PANEL -->

<div class="panel">

<h1>❤️ Love Air Pen</h1>

<button id="clearBtn">Clear</button>

<button id="savePNGBtn">Save PNG</button>

<button id="saveSVGBtn">Export SVG</button>

<button id="savePDFBtn">Export PDF</button>

<button id="recognizeBtn">Recognize Text</button>

<button id="replayBtn">Replay Drawing</button>

</div>


<!-- STATUS BAR -->

<div id="status">Initializing AI...</div>


<!-- MAIN APPLICATION -->

<script type="module" src="app.js"></script>


<!-- INTRO FLOW SCRIPT -->

<script>

const warningScreen = document.getElementById("warningScreen")
const nameScreen = document.getElementById("nameScreen")
const messageScreen = document.getElementById("messageScreen")

const startBtn = document.getElementById("startBtn")
const continueBtn = document.getElementById("continueBtn")

const userNameInput = document.getElementById("userName")
const personalMessage = document.getElementById("personalMessage")

// WARNING → NAME SCREEN
startBtn.onclick = () => {

warningScreen.style.display = "none"
nameScreen.style.display = "flex"

}

// NAME → MESSAGE
continueBtn.onclick = () => {

const name = userNameInput.value.trim()

if(name === ""){

alert("Please enter your name")
return

}

nameScreen.style.display = "none"
messageScreen.style.display = "flex"

personalMessage.innerHTML =
`Hey <b>${name}</b> ❤️<br><br>
I hope you like this.<br>
This is specially made for you.<br><br>
Let's start.`

// message visible 3 sec
setTimeout(()=>{

messageScreen.style.display="none"

},3500)

}

</script>


<!-- HEART BACKGROUND SCRIPT -->

<script>

const heartsContainer = document.getElementById("hearts")

function createHeart(){

const heart = document.createElement("div")

heart.className = "heart"

heart.style.left = Math.random()*100 + "vw"

heart.style.animationDuration = (6 + Math.random()*10) + "s"

heart.style.fontSize = (14 + Math.random()*24) + "px"

heartsContainer.appendChild(heart)

setTimeout(()=>{
heart.remove()
},15000)

}

setInterval(createHeart,800)

</script>


</body>
</html>
